quarkus:
  swagger-ui:
    always-include: true
    path: /swagger

  datasource:
    db-kind: postgresql
    username: skilluser
    password: fireball
    jdbc:
      url: jdbc:postgresql://localhost:5432/skilltrack

  hibernate-orm:
    log:
      sql: true

  http:
    auth:
      basic: true
      policy:
        roles-allowed:
          roles-allowed: admin,user


openai:
  api:
    key: ${openai_api}
    url: https://api.openai.com/v1/chat/completions
