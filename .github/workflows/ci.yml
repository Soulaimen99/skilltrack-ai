name: CI build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Ensure Docker is running
        run: echo "Docker is pre-installed and enabled on GitHub runner."

      - name: Set up environment variables for Testcontainers
        run: |
          echo "DB_USER=${{ secrets.DB_USER }}" >> $GITHUB_ENV
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> $GITHUB_ENV
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> $GITHUB_ENV

      - name: Wait for Testcontainers to start
        run: |
          docker --version
          echo "Testcontainers will handle the PostgreSQL database lifecycle."

      - name: Build and test
        run: ./mvnw clean verify -B