name: CI build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      docker:
        # Docker-in-Docker service
        image: docker:dind
        env:
          # Remove TLS to let the main container talk to the docker:dind service over port 2375
          DOCKER_TLS_CERTDIR: ""
        options: --storage-driver=vfs

    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker
        run: docker info
        env:
          DOCKER_HOST: tcp://docker:2375

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build and test
        run: ./mvnw clean verify -B
        env:
          DOCKER_HOST: tcp://docker:2375